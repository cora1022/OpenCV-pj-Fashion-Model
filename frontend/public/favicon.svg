<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">StyleLens AI</title>
  <desc id="desc">A fashion image search service mark with a lens and garment frame.</desc>
  <defs>
    <linearGradient id="bg" x1="10" x2="54" y1="8" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16202A"/>
      <stop offset="1" stop-color="#070B12"/>
    </linearGradient>
    <linearGradient id="accent" x1="15" x2="50" y1="16" y2="50" gradientUnits="userSpaceOnUse">
      <stop stop-color="#95F28D"/>
      <stop offset="1" stop-color="#49B7FF"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <path d="M18 21.5c2.8-3.6 5.8-5.4 9-5.4h10c3.2 0 6.2 1.8 9 5.4" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <path d="M21 25v16.5c0 2.2 1.8 4 4 4h13.8" fill="none" stroke="#EAF7F0" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M43 25v7.6" fill="none" stroke="#EAF7F0" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="41.5" cy="41.5" r="8.5" fill="none" stroke="url(#accent)" stroke-width="4" filter="url(#glow)"/>
  <path d="m48.2 48.2 6.3 6.3" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <path d="M28 25.5c.8 2 2.4 3 4 3s3.2-1 4-3" fill="none" stroke="#95F28D" stroke-width="3" stroke-linecap="round"/>
</svg>
