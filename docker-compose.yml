services:
  caddy:
    image: caddy:2
    container_name: fashion-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: fashion-frontend
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fashion-backend
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-fashion_user}:${MYSQL_PASSWORD:-fashion_password}@mysql:3306/${MYSQL_DATABASE:-fashion_app}
      YOLO_CLOTHING_MODEL_PATH: ${YOLO_CLOTHING_MODEL_PATH:-backend/models/yolov8n-clothing-detection-best.pt}
    volumes:
      - backend_uploads:/app/backend/uploads
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant
    container_name: fashion-qdrant
    expose:
      - "6333"
      - "6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  mysql:
    image: mysql:8
    container_name: fashion-mysql
    expose:
      - "3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fashion_app}
      MYSQL_USER: ${MYSQL_USER:-fashion_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-fashion_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-fashion_root_password}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  qdrant_storage:
  mysql_data:
  backend_uploads:
